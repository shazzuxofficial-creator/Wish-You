<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="styles/birthday.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Confetti / Floating Elements Background Animation -->
    <div class="confetti-bg">
        <span>🎉</span>
        <span>🎂</span>
        <span>🎈</span>
        <span>🎁</span>
        <span>✨</span>
    </div>

    <!-- Mobile Screen Frame Container -->
    <div class="mobile-frame">
        <div class="card-content">
            <div class="badge">Happy Birthday to You</div>
            
            <!-- Receiver Name -->
            <h1 id="receiverName">Lily</h1>
            
            <div class="cake-icon">🎂</div>
            
            <!-- Default Note Paragraph -->
            <p id="wishMessage" class="message">
                Wishing you a day filled with happiness and a year filled with joy. May all your dreams and wishes come true today!
            </p>

            <!-- Sender Name -->
            <div class="sender-section">
                <span>Warmest wishes,</span>
                <h3 id="senderName">John</h3>
            </div>
        </div>
    </div>

    <script src="scripts/birthday.js"></script>
</body>
</html>
